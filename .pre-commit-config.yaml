repos:
  # Basic checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: '^(uv\.lock|pylock\.toml)$'
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      # First try to fix issues
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      # Format the code
      - id: ruff-format
        types_or: [python, pyi]
      # Then check like CI/CD does
      - id: ruff
        name: ruff-check-ci
        args: []  # No --fix, just check
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format-check-ci
        args: [--check]  # Check only, don't format
        types_or: [python, pyi]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.0
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
        args: [--explicit-package-bases]
        files: ^glimmer/  # Check only glimmer package
        stages: [manual]  # Only run manually, don't block commits
        # MyPy errors don't block commits (type hints are improving gradually)
        # Run manually with: pre-commit run mypy --all-files
